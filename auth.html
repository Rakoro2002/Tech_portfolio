<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | TechPortfolio</title>
    <style>
        :root {
            --primary: #58a6ff;
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
        }

        .auth-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 0;
            cursor: pointer;
            color: #8b949e;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #79c0ff; }
        
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-tabs">
        <div class="tab active" id="loginTab" onclick="toggleAuth('login')">Login</div>
        <div class="tab" id="registerTab" onclick="toggleAuth('register')">Register</div>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Email / Username</label>
            <input type="text" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn">Sign In</button>
    </form>

    <form id="registerForm" style="display: none;">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="example@gmail.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create password">
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>

    <a href="index.html" class="back-home">← Back to Portfolio</a>
</div>

<script>
    function toggleAuth(type) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');

        if (type === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
        }
    }
</script>

</body>
</html>
